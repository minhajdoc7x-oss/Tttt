<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bakery Counter</title>
<style>
body{
    font-family: Arial;
    text-align:center;
    padding:20px;
}
button{
    width:100px;
    height:70px;
    font-size:28px;
    margin:8px;
}
#total{
    font-size:40px;
    font-weight:bold;
    margin:20px;
}
</style>
</head>
<body>

<h2>Bakery Snacks</h2>

<button onclick="add(13)">13</button>
<button onclick="add(15)">15</button>
<button onclick="add(20)">20</button>
<button onclick="add(30)">30</button>

<h1 id="total">₹0</h1>

<button onclick="undo()">Undo</button>
<button onclick="resetAll()">Reset</button>

<script>
let total = 0;
let history = [];

function add(price){
    total += price;
    history.push(price);
    document.getElementById("total").innerText = "₹" + total;
}

function undo(){
    if(history.length){
        total -= history.pop();
        document.getElementById("total").innerText = "₹" + total;
    }
}

function resetAll(){
    total = 0;
    history = [];
    document.getElementById("total").innerText = "₹0";
}
</script>

</body>
</html>
